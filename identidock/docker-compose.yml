services:
   identidock:
      container_name: identidock
      build: .
      ports:
         - "5000:5000"
      environment:
         ENV: DEV
      volumes:
         - ./app:/app
      links:
         - dnmonster
         - redis

   dnmonster:
      image: amouat/dnmonster:1.0
      container_name: dnmonster

   redis:
      image: redis:8.6.2-alpine
      container_name: redis
